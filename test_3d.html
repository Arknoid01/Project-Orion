<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Test 3D</title>
<style>*{margin:0;padding:0}html,body{width:100%;height:100%;background:#111;overflow:hidden}
#log{position:fixed;top:0;left:0;right:0;color:#0f0;font:12px monospace;padding:8px;background:rgba(0,0,0,.8);z-index:999;white-space:pre-wrap;max-height:40vh;overflow:auto}</style>
</head>
<body>
<div id="log">Chargement Three.js...\n</div>
<script>
function log(msg){ document.getElementById('log').textContent += msg + '\n'; console.log(msg); }
</script>
<script type="module">
try {
  log('Import Three.js...');
  const THREE = await import('./js/three.min.js');
  log('THREE chargé ! revision=' + THREE.REVISION);

  // Test minimal : juste un cube rouge
  const renderer = new THREE.WebGLRenderer({ antialias:false });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);
  log('Renderer créé');

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x336699);

  const cam = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
  cam.position.set(3, 3, 3);
  cam.lookAt(0, 0, 0);

  scene.add(new THREE.AmbientLight(0xffffff, 1));

  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshLambertMaterial({ color: 0x44aa44 })
  );
  scene.add(cube);
  log('Cube ajouté — lancement boucle');

  (function loop(){ requestAnimationFrame(loop); cube.rotation.y += 0.01; renderer.render(scene, cam); })();

} catch(e) {
  log('ERREUR: ' + e.message);
  log(e.stack || '(pas de stack)');
}
</script>
</body>
</html>
