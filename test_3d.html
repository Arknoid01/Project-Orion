<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Test 3D — Olympos</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#000;overflow:hidden}
  #info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;padding:8px 16px;border-radius:8px;font:14px sans-serif;text-align:center;pointer-events:none}
</style>
</head>
<body>
<div id="info">1 doigt = tourner · 2 doigts = zoom · double-tap = vue iso</div>
<script type="module">
import * as THREE from './js/three.min.js';

/* ---- RENDERER ---- */
const renderer = new THREE.WebGLRenderer({ antialias: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* ---- SCENE ---- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

/* ---- LUMIERE ---- */
scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xffffff, 0.8);
sun.position.set(5, 10, 5);
scene.add(sun);

/* ---- CAMERA ISO (orthographique) ---- */
let zoom = 14;
function makeOrtho(){
  const a = window.innerWidth / window.innerHeight;
  return new THREE.OrthographicCamera(-zoom*a/2, zoom*a/2, zoom/2, -zoom/2, -100, 100);
}
let cam = makeOrtho();

let angleH = Math.PI / 4;
let angleV = Math.atan(1/Math.sqrt(2)); // ~35.26° = vrai iso

function updateCam(){
  const d = 30;
  cam.position.set(
    d * Math.cos(angleV) * Math.sin(angleH),
    d * Math.sin(angleV),
    d * Math.cos(angleV) * Math.cos(angleH)
  );
  cam.lookAt(0, 0, 0);
  cam.updateProjectionMatrix();
}
updateCam();

/* ---- CUBES ---- */
const geo = new THREE.BoxGeometry(1, 1, 1);
const GRID = 16;

// Crée une texture procédurale pixel art
function makePixelTex(topHex, sideHex){
  const S = 32;
  const cv = document.createElement('canvas');
  cv.width = S * 3; cv.height = S * 2; // atlas 3 colonnes : top, side, dark
  const ctx = cv.getContext('2d');

  const colors = { top: topHex, side: sideHex, dark: darken(sideHex, 0.6) };
  let col = 0;
  for (const [key, hex] of Object.entries(colors)){
    ctx.fillStyle = hex;
    ctx.fillRect(col * S, 0, S, S);
    // Bruit pixel
    for (let i = 0; i < 60; i++){
      const px = Math.floor(Math.random()*S/4)*4 + col*S;
      const py = Math.floor(Math.random()*S/4)*4;
      ctx.fillStyle = Math.random()>.5 ? lighten(hex,.15) : darken(hex,.15);
      ctx.fillRect(px, py, 4, 4);
    }
    col++;
  }
  const tex = new THREE.CanvasTexture(cv);
  tex.magFilter = THREE.NearestFilter;
  tex.minFilter = THREE.NearestFilter;
  return tex;
}

function hexToRgb(h){ const n=parseInt(h.slice(1),16); return [n>>16&255,(n>>8)&255,n&255]; }
function rgbToHex(r,g,b){ return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join(''); }
function darken(h,f){ const [r,g,b]=hexToRgb(h); return rgbToHex(r*f|0,g*f|0,b*f|0); }
function lighten(h,f){ const [r,g,b]=hexToRgb(h); return rgbToHex(Math.min(255,(r*(1+f))|0),Math.min(255,(g*(1+f))|0),Math.min(255,(b*(1+f))|0)); }

// Matériau cubique : [droite, gauche, haut, bas, avant, arrière]
function cubeMat(topHex, sideHex){
  const tex = makePixelTex(topHex, sideHex);
  const S = 32, W = S*3, H = S;
  function face(x){ return new THREE.MeshLambertMaterial({ map: new THREE.CanvasTexture(cropTex(tex.image, x*S, 0, S, S)) }); }
  return [face(1), face(1), face(0), face(2), face(1), face(1)];
}

function cropTex(img, sx, sy, sw, sh){
  const cv = document.createElement('canvas');
  cv.width = sw; cv.height = sh;
  cv.getContext('2d').drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);
  const t = new THREE.CanvasTexture(cv);
  t.magFilter = THREE.NearestFilter; t.minFilter = THREE.NearestFilter;
  return t;
}

// Matériaux
const MATS = {
  grass: cubeMat('#4a9e38', '#8B6340'),
  dirt:  cubeMat('#7a5230', '#7a5230'),
  sand:  cubeMat('#d4b870', '#c9aa60'),
  water: cubeMat('#3a86c8', '#2a76b8'),
  rock:  cubeMat('#8a8070', '#7a7060'),
};

// Grille
const group = new THREE.Group();
for (let x = 0; x < GRID; x++){
  for (let z = 0; z < GRID; z++){
    const nx = x/GRID*6, nz = z/GRID*6;
    const noise = (Math.sin(nx)*Math.cos(nz) + Math.sin(nx*1.7)*Math.cos(nz*2.3))*0.5 + 0.5;
    const h = Math.max(1, Math.round(noise * 4));

    let key = h <= 1 ? 'sand' : h >= 4 ? 'rock' : 'grass';

    for (let y = 0; y < h; y++){
      const mat = y === h-1 ? MATS[key] : MATS.dirt;
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x - GRID/2 + .5, y - 1, z - GRID/2 + .5);
      group.add(mesh);
    }
  }
}
scene.add(group);

/* ---- RESIZE ---- */
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  const a = window.innerWidth / window.innerHeight;
  cam.left = -zoom*a/2; cam.right = zoom*a/2;
  cam.top = zoom/2; cam.bottom = -zoom/2;
  cam.updateProjectionMatrix();
});

/* ---- CONTROLES TACTILES ---- */
const el = renderer.domElement;
let lastT = null, pinch = null, lastTap = 0;

el.addEventListener('touchstart', e => {
  if (e.touches.length===1) lastT={x:e.touches[0].clientX,y:e.touches[0].clientY};
  if (e.touches.length===2) pinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  // Double tap → vue iso
  const now=Date.now();
  if (now-lastTap<300){ angleH=Math.PI/4; angleV=Math.atan(1/Math.sqrt(2)); updateCam(); }
  lastTap=now;
},{passive:true});

el.addEventListener('touchmove', e=>{
  e.preventDefault();
  if (e.touches.length===1&&lastT){
    angleH -= (e.touches[0].clientX-lastT.x)*0.008;
    angleV = Math.max(0.05, Math.min(Math.PI/2-.05, angleV-(e.touches[0].clientY-lastT.y)*0.005));
    updateCam();
    lastT={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
  if (e.touches.length===2&&pinch){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    zoom=Math.max(4,Math.min(32,zoom*pinch/d));
    pinch=d;
    const a=window.innerWidth/window.innerHeight;
    cam.left=-zoom*a/2;cam.right=zoom*a/2;cam.top=zoom/2;cam.bottom=-zoom/2;
    cam.updateProjectionMatrix();
  }
},{passive:false});

el.addEventListener('touchend',e=>{if(e.touches.length<1)lastT=null;if(e.touches.length<2)pinch=null;});

// Souris desktop
let mDown=false,mLast=null;
el.addEventListener('mousedown',e=>{mDown=true;mLast={x:e.clientX,y:e.clientY};});
window.addEventListener('mouseup',()=>mDown=false);
window.addEventListener('mousemove',e=>{
  if(!mDown||!mLast)return;
  angleH-=(e.clientX-mLast.x)*0.005;
  angleV=Math.max(0.05,Math.min(Math.PI/2-.05,angleV-(e.clientY-mLast.y)*0.004));
  updateCam(); mLast={x:e.clientX,y:e.clientY};
});
el.addEventListener('wheel',e=>{
  zoom=Math.max(4,Math.min(32,zoom+e.deltaY*0.02));
  const a=window.innerWidth/window.innerHeight;
  cam.left=-zoom*a/2;cam.right=zoom*a/2;cam.top=zoom/2;cam.bottom=-zoom/2;
  cam.updateProjectionMatrix();
},{passive:true});

/* ---- BOUCLE ---- */
(function animate(){ requestAnimationFrame(animate); renderer.render(scene,cam); })();
console.log('[3D test] Three.js r'+THREE.REVISION+' — OK');
</script>
</body>
</html>
