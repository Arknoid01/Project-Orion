<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Test couture v2 — pipeline fidèle (bake + cache + écran)</title>
<style>
  html, body { margin:0; padding:0; background:#111; color:#eee; font-family:sans-serif; overflow:hidden; }
  #ui {
    position:fixed; top:0; left:0; right:0; z-index:10;
    background:rgba(0,0,0,0.85); padding:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;
  }
  button {
    padding:10px 14px; font-size:14px; border-radius:8px; border:1px solid #888;
    background:#222; color:#eee;
  }
  button.active { background:#2a6; border-color:#2a6; }
  #info { font-size:12px; opacity:0.85; width:100%; white-space:pre-wrap; }
  #wrap { position:fixed; top:120px; left:0; right:0; bottom:0; overflow:auto; }
  canvas { display:block; image-rendering: auto; }
</style>
</head>
<body>
<div id="ui">
  <button id="btn1px" class="active">Etape 1 : bake brut (1 sprite seul, zoom x4)</button>
  <button id="btnCache">Etape 2 : grille sur cache (= terrainLayerCache du jeu)</button>
  <button id="btnScreen">Etape 3 : cache -> écran (= pipeline complet réel)</button>
  <div id="info"></div>
</div>
<div id="wrap"><canvas id="cv"></canvas></div>

<!-- cache-bust : v3-diag -->
<!-- On réutilise le VRAI fichier de bake du jeu, sans le modifier -->
<script src="js/terrainVoxelBake.js?v=8inset28"></script>
<script>
const TILE_W = 64, TILE_H = 32;
const TERRAIN_TILE_OVERLAP = 4; // valeur corrigee (etait 10, cause confirmee du quadrillage)
const TERRAIN_CUBE_FULL_FACES = true;
const TERRAIN_BLOCK_SIDE_H = 32;
const TERRAIN_BLOCK_SIDE_WALL_MIN = 8;
const TERRAIN_BLOCK_SIDE_WALL_MAX = 16;
const COLS = 10, ROWS = 10;

const img = new Image();
img.src = 'assets/tiles/blocks/grass.png?v=8inset28';

let bakedCanvas = null;
let bakeError = null;

function doBake(){
  try {
    const trimmed = trimTransparentCanvas(img);
    const result = bakeTerrainBlockCanvas(trimmed.canvas, TILE_W, TILE_H);
    if (!result){ bakeError = 'bakeTerrainBlockCanvas a retourné null'; return; }
    bakedCanvas = result.canvas;
  } catch (e){
    bakeError = 'Exception pendant le bake : ' + (e && e.message);
  }
}

function tileScreenX(col, row){ return (col - row) * (TILE_W / 2); }
function tileScreenY(col, row){ return (col + row) * (TILE_H / 2); }

/** Scanne toute une ligne horizontale et repère les chutes de luminosité (coutures). */
function scanRowForSeams(ctx, y){
  const w = ctx.canvas.width;
  let data;
  try { data = ctx.getImageData(0, Math.max(0, y - 1), w, 3).data; }
  catch(e){ return 'getImageData impossible : ' + e.message; }
  const rowW = w;
  const brightness = new Array(rowW);
  for (let x = 0; x < rowW; x++){
    const i = (1 * rowW + x) * 4; // ligne du milieu des 3 lignes lues
    brightness[x] = (data[i] + data[i+1] + data[i+2]) / 3;
  }
  // moyenne glissante locale (5px) pour comparer chaque pixel a son voisinage
  let dips = [];
  for (let x = 4; x < rowW - 4; x++){
    const local = (brightness[x-4]+brightness[x-3]+brightness[x-2]+brightness[x-1]+brightness[x+1]+brightness[x+2]+brightness[x+3]+brightness[x+4]) / 8;
    const drop = local - brightness[x];
    if (drop > 18) dips.push({ x, drop: Math.round(drop), val: Math.round(brightness[x]), around: Math.round(local) });
  }
  if (!dips.length) return `Ligne y=${y} : AUCUNE chute de luminosité detectee (scan de ${rowW}px). Pas de couture sur cette ligne.`;
  // regroupe les dips consecutifs
  const groups = [];
  let cur = [dips[0]];
  for (let i = 1; i < dips.length; i++){
    if (dips[i].x - dips[i-1].x <= 2) cur.push(dips[i]);
    else { groups.push(cur); cur = [dips[i]]; }
  }
  groups.push(cur);
  const summary = groups.map(g => {
    const worst = g.reduce((a,b) => a.drop > b.drop ? a : b);
    return `x=${worst.x} (chute de ${worst.drop}, val=${worst.val} vs voisinage=${worst.around})`;
  }).join(' | ');
  return `Ligne y=${y} : ${groups.length} couture(s) detectee(s) sur ${rowW}px scannes -> ${summary}`;
}

function fullDiagnostic(ctx, worldH){
  const lines = [];
  // teste plusieurs hauteurs : sommet du losange, milieu, bas
  const ys = [Math.round(worldH*0.15), Math.round(worldH*0.35), Math.round(worldH*0.5), Math.round(worldH*0.65), Math.round(worldH*0.85)];
  ys.forEach(y => { if (y > 0 && y < ctx.canvas.height) lines.push(scanRowForSeams(ctx, y)); });
  return lines.join('\n');
}

/** Compare la luminosité du centre du losange a celle de son bord (vignette naturelle ?). */
function measureVignette(canvas){
  const w = canvas.width, h = canvas.height;
  const ctx = canvas.getContext('2d');
  let data;
  try { data = ctx.getImageData(0, 0, w, h).data; } catch(e){ return 'mesure impossible : ' + e.message; }
  function brightnessAt(x, y){
    x = Math.round(x); y = Math.round(y);
    if (x < 0 || x >= w || y < 0 || y >= h) return null;
    const i = (y * w + x) * 4;
    if (d_alpha(data, i) < 10) return null;
    return (data[i] + data[i+1] + data[i+2]) / 3;
  }
  function d_alpha(data, i){ return data[i+3]; }
  const cx = w / 2, cy = h * 0.35; // centre approximatif du cap (pas les parois)
  const center = brightnessAt(cx, cy);
  const edgeLeft = brightnessAt(w * 0.12, h * 0.35);
  const edgeRight = brightnessAt(w * 0.88, h * 0.35);
  const edgeTop = brightnessAt(w / 2, h * 0.06);
  return `Centre du losange: ${center!==null?Math.round(center):'transparent'} | Bord gauche: ${edgeLeft!==null?Math.round(edgeLeft):'transparent'} | Bord droit: ${edgeRight!==null?Math.round(edgeRight):'transparent'} | Bord haut: ${edgeTop!==null?Math.round(edgeTop):'transparent'} -> ${center!==null && edgeLeft!==null ? 'difference centre/bord gauche = '+Math.round(center-edgeLeft) : ''}`;
}

function step1(){
  const cv = document.getElementById('cv');
  cv.width = 400; cv.height = 400;
  cv.style.width = '400px'; cv.style.height = '400px';
  const ctx = cv.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.fillStyle = '#222';
  ctx.fillRect(0, 0, 400, 400);
  if (bakedCanvas){
    ctx.drawImage(bakedCanvas, 0, 0, bakedCanvas.width, bakedCanvas.height, 20, 20, bakedCanvas.width * 4, bakedCanvas.height * 4);
  }
  const vignette = bakedCanvas ? measureVignette(bakedCanvas) : '';
  document.getElementById('info').textContent = bakeError
    ? ('ERREUR DE BAKE : ' + bakeError)
    : `Sprite baké isolé, zoomé x4. Taille bakée : ${bakedCanvas ? bakedCanvas.width+'x'+bakedCanvas.height : '?'}px.\nVIGNETTE (luminosite 0-255) : ${vignette}\n-> Si "difference centre/bord" > 15-20, le sprite a une vraie vignette qui peut creer le quadrillage en se touchant entre tuiles.`;
}

function step2(){
  const cv = document.getElementById('cv');
  const worldW = (COLS + ROWS) * (TILE_W / 2);
  const worldH = (COLS + ROWS) * (TILE_H / 2) + TILE_H;
  cv.width = worldW; cv.height = worldH;
  cv.style.width = worldW + 'px'; cv.style.height = worldH + 'px';
  const ctx = cv.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.fillStyle = '#234';
  ctx.fillRect(0, 0, worldW, worldH);
  const offsetX = ROWS * (TILE_W / 2);
  ctx.setTransform(1, 0, 0, 1, offsetX, 0);
  const pad = TERRAIN_TILE_OVERLAP;
  for (let row = 0; row < ROWS; row++){
    for (let col = 0; col < COLS; col++){
      const cx = tileScreenX(col, row);
      const cy = tileScreenY(col, row);
      const drawW = TILE_W + pad;
      const drawH = (bakedCanvas.height / bakedCanvas.width) * drawW;
      ctx.drawImage(bakedCanvas, cx - drawW / 2, cy, drawW, drawH);
    }
  }
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  const diag = fullDiagnostic(ctx, worldH);
  document.getElementById('info').textContent =
    `Grille bakée sur le cache (résolution native, ${worldW}x${worldH}px).\nSCAN AUTOMATIQUE (5 lignes horizontales, toute la largeur) :\n${diag}`;
}

function step3(){
  const cv = document.getElementById('cv');
  const worldW = (COLS + ROWS) * (TILE_W / 2);
  const worldH = (COLS + ROWS) * (TILE_H / 2) + TILE_H;

  const cache = document.createElement('canvas');
  cache.width = worldW; cache.height = worldH;
  const cctx = cache.getContext('2d');
  cctx.imageSmoothingEnabled = true;
  cctx.imageSmoothingQuality = 'high';
  const offsetX = ROWS * (TILE_W / 2);
  cctx.setTransform(1, 0, 0, 1, offsetX, 0);
  const pad = TERRAIN_TILE_OVERLAP;
  for (let row = 0; row < ROWS; row++){
    for (let col = 0; col < COLS; col++){
      const cx = tileScreenX(col, row);
      const cy = tileScreenY(col, row);
      const drawW = TILE_W + pad;
      const drawH = (bakedCanvas.height / bakedCanvas.width) * drawW;
      cctx.drawImage(bakedCanvas, cx - drawW / 2, cy, drawW, drawH);
    }
  }

  const zoomLevel = 1.6;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  cv.width = Math.round(worldW * zoomLevel * dpr);
  cv.height = Math.round(worldH * zoomLevel * dpr);
  cv.style.width = (worldW * zoomLevel) + 'px';
  cv.style.height = (worldH * zoomLevel) + 'px';
  const ctx = cv.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.setTransform(zoomLevel * dpr, 0, 0, zoomLevel * dpr, 0, 0);
  ctx.drawImage(cache, 0, 0);
  ctx.setTransform(1, 0, 0, 1, 0, 0);

  const diag = fullDiagnostic(ctx, cv.height);
  document.getElementById('info').textContent =
    `Pipeline complet : bake -> cache -> blit zoomé x${zoomLevel} (dpr=${dpr}).\nSCAN AUTOMATIQUE (5 lignes horizontales, toute la largeur) :\n${diag}`;
}

let mode = '1';
function refresh(){
  if (!bakedCanvas){ doBake(); }
  if (bakeError){ document.getElementById('info').textContent = 'ERREUR DE BAKE : ' + bakeError; return; }
  if (mode === '1') step1();
  else if (mode === '2') step2();
  else step3();
}

img.onload = refresh;
img.onerror = () => { document.getElementById('info').textContent = 'Erreur chargement grass.png — lance cette page depuis la racine du projet.'; };

function setActive(id){
  ['btn1px','btnCache','btnScreen'].forEach(b => document.getElementById(b).classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
document.getElementById('btn1px').onclick = () => { mode = '1'; setActive('btn1px'); refresh(); };
document.getElementById('btnCache').onclick = () => { mode = '2'; setActive('btnCache'); refresh(); };
document.getElementById('btnScreen').onclick = () => { mode = '3'; setActive('btnScreen'); refresh(); };
</script>
</body>
</html>
